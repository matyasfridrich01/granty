<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databáze grantových příležitostí</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F2EC;--surface:#EDEADE;--border:#D4CFC4;--text:#1C1A16;--muted:#7A7468;--aktivni:#2D6A2D;--aktivni-bg:#E8F4E8;--plan:#7A5C00;--plan-bg:#FFF8DC;--uzav:#8A3A1A;--uzav-bg:#FDF0EB;--accent:#2A4A7F;--accent-light:#EBF0FA;--ff:'Fraunces',Georgia,serif;--fm:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fm);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.header{padding:2rem 2.5rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.header h1{font-family:var(--ff);font-size:1.9rem;font-weight:300;font-style:italic;line-height:1.1}
.header .sub{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.04em}
.stats{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.stat{background:var(--surface);padding:.8rem 1.2rem;text-align:center;min-width:80px}
.stat-num{font-family:var(--ff);font-size:1.5rem;font-weight:600;display:block}
.stat-num.g{color:var(--aktivni)}.stat-num.o{color:var(--plan)}.stat-num.m{color:var(--muted)}.stat-num.b{color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.filters{padding:1rem 2.5rem;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;background:var(--surface)}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.filters select,.filters input{font-family:var(--fm);font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);height:32px;outline:none}
.filters input{min-width:210px}
.filters select:focus,.filters input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.sep{width:1px;background:var(--border);height:36px;margin:0 2px}
.btn-reset{font-family:var(--fm);font-size:11px;color:var(--muted);border:1px solid var(--border);background:transparent;padding:5px 12px;border-radius:4px;cursor:pointer;height:32px;letter-spacing:.04em}
.btn-reset:hover{color:var(--text);border-color:var(--muted)}
.countbar{padding:.6rem 2.5rem;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:9px 14px;text-align:left;background:var(--surface);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--surface)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 14px;vertical-align:top;line-height:1.45}
.td-vyzva{font-weight:500;max-width:280px}
.prog-hint{font-size:10px;color:var(--muted);font-weight:400;margin-top:2px}
.td-prov{color:var(--muted);white-space:nowrap}
.td-sub{color:var(--muted);max-width:130px}
.td-cil{max-width:170px;color:var(--muted);font-size:12px}
.td-dl{white-space:nowrap}
.td-dot{white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums}
.td-kom{max-width:150px;color:var(--muted);font-size:11px;font-style:italic}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:100px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.ba{background:var(--aktivni-bg);color:var(--aktivni);border:1px solid #b5d6b5}
.bp{background:var(--plan-bg);color:var(--plan);border:1px solid #e0cf80}
.bu{background:var(--uzav-bg);color:var(--uzav);border:1px solid #e8c4b0}
.urgent{color:#B03A00;font-weight:500}.soon{color:#7A5C00}.past{color:var(--muted);text-decoration:line-through}
.dot-val{font-weight:500}.dot-mena{font-size:10px;color:var(--muted);margin-left:3px}.dot-txt{color:var(--muted);font-size:11px;font-style:italic}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.overlay{display:none;position:fixed;inset:0;background:rgba(28,26,22,.4);z-index:100;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(560px,96vw);background:var(--bg);border-left:1px solid var(--border);z-index:101;overflow-y:auto;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);padding:2rem}
.panel.open{transform:translateX(0)}
.pclose{position:absolute;top:1rem;right:1rem;background:none;border:1px solid var(--border);border-radius:4px;width:28px;height:28px;cursor:pointer;color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center}
.pclose:hover{color:var(--text)}
.ptitle{font-family:var(--ff);font-size:1.3rem;font-weight:400;line-height:1.3;margin-bottom:.5rem;padding-right:2.5rem}
.pcrumb{font-size:11px;color:var(--muted);margin-bottom:1.5rem;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:1.5rem}
.pcell{background:var(--surface);padding:.8rem 1rem}
.pcell.full{grid-column:1/-1}
.pclabel{font-size:10px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.pcval{font-size:13px;color:var(--text);line-height:1.5}
.pcval.big{font-family:var(--ff);font-size:1.2rem;font-weight:300}
.psec{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.pnaklady{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem;font-size:12px;line-height:1.7;margin-bottom:1.5rem;white-space:pre-wrap}
.pkom{background:var(--plan-bg);border:1px solid #e0cf80;border-radius:6px;padding:.8rem 1rem;font-size:12px;font-style:italic;color:var(--plan);margin-bottom:1.5rem}
.pstav{margin-bottom:1rem}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Databáze dotačních příležitostí</h1>
    <div class="sub">Inkubace a akcelerace výzkumných projektů · list Výzvy</div>
  </div>
  <div class="stats" id="stats"></div>
</div>
<div class="filters">
  <div class="fg"><div class="fl">Hledat</div><input type="text" id="q" placeholder="Název, poskytovatel, cílová skupina…"></div>
  <div class="sep"></div>
  <div class="fg"><div class="fl">Stav</div>
    <select id="fStav">
      <option value="">Všechny stavy</option>
      <option value="aktivní">Aktivní</option>
      <option value="plánované">Plánované</option>
      <option value="uzavřena">Uzavřené</option>
    </select>
  </div>
  <div class="fg"><div class="fl">Program</div><select id="fProg"><option value="">Všechny programy</option></select></div>
  <div class="fg"><div class="fl">Podprogram</div><select id="fSub"><option value="">Všechny podprogramy</option></select></div>
  <div class="sep"></div>
  <div class="fg"><div class="fl">Řadit</div>
    <select id="fSort">
      <option value="dl">Deadline ↑</option>
      <option value="dotD">Dotace ↓</option>
      <option value="dotA">Dotace ↑</option>
      <option value="az">Název A→Z</option>
    </select>
  </div>
  <button class="btn-reset" onclick="reset()">✕ Reset</button>
</div>
<div class="countbar" id="cnt"></div>
<div style="overflow-x:auto">
<table>
  <thead><tr>
    <th>Výzva / Program</th><th>Poskytovatel</th><th>Podprogram</th>
    <th>Cílová skupina</th><th>Stav</th><th>Uzávěrka</th>
    <th style="text-align:right">Max dotace</th><th>Komentář</th>
  </tr></thead>
  <tbody id="tb"></tbody>
</table>
<div class="empty" id="emp" style="display:none">Žádné výzvy neodpovídají filtrům.</div>
</div>
<div class="overlay" id="ov" onclick="closeP()"></div>
<div class="panel" id="panel">
  <button class="pclose" onclick="closeP()">✕</button>
  <div id="pc"></div>
</div>

ns (BASS)", "typ_akce": null, "vyzva": "Rural Transportation Networks (Competitive call)", "komentar": null, "naklady": "Osobní náklady, cestovné, materiál a software, režie, 75 % funding, max. 75 000 EUR; celkové náklady studie až 100 000 EUR (zero-equity).", "cilova_skupina": "firmy (vybrané země, vč. CZ)", "stav": "uzavřena", "uzaverka": "2026-04-01", "max_dotace": "75000", "mena": "EUR", "zdroj": "Rural Transportation Networks"}, {"poskytovatel": "EUSPA a ESA financování", "program": "ESA", "podprogram": "ESA Technology Broker", "typ_akce": null, "vyzva": "Spark Funding | ESA Technology Broker Czech Republic", "komentar": null, "naklady": "Podpora dle podmínek výzvy", "cilova_skupina": "Firmy/projekty se space vazbou (ověření/rozjezd)", "stav": "uzavřena", "uzaverka": "2026-03-20", "max_dotace": "75000", "mena": "EUR", "zdroj": "Spark Funding | ESA Technology Broker Czech Republic"}];

let _rows = [];

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lbl(d){return d.vyzva||d.typ_akce||d.podprogram||d.program||'—';}
function parseDot(v){if(!v)return null;const n=parseFloat(String(v).replace(/\s/g,'').replace(',','.'));return isNaN(n)?null:n;}
function fmtDot(v,m){
  if(!v)return null;
  const n=parseDot(v);
  if(!n)return {t:v,txt:true};
  let s=n>=1e6?(n/1e6).toLocaleString('cs-CZ',{maximumFractionDigits:1})+' mil.':n>=1000?(n/1000).toLocaleString('cs-CZ',{maximumFractionDigits:0})+' tis.':n.toLocaleString('cs-CZ');
  return {t:s,m,txt:false};
}
function fmtDate(s){if(!s)return null;if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const[y,mo,d]=s.split('-');return `${d}.${mo}.${y}`;}return s;}
function dlCls(s){
  if(!s||!/^\d{4}-\d{2}-\d{2}$/.test(s))return '';
  const diff=(new Date(s)-new Date())/86400000;
  if(diff<0)return 'past';if(diff<14)return 'urgent';if(diff<45)return 'soon';return '';
}
function badge(stav){
  if(!stav)return '';
  const c=stav==='aktivní'?'ba':stav==='plánované'?'bp':'bu';
  const l=stav==='aktivní'?'Aktivní':stav==='plánované'?'Plánované':'Uzavřená';
  return `<span class="badge ${c}">${l}</span>`;
}

// Populate program filter
const progs=[...new Set(DATA.map(d=>d.program).filter(Boolean))].sort();
const fpEl=document.getElementById('fProg');
progs.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p.trim();fpEl.appendChild(o);});

function updateSubs(){
  const pr=document.getElementById('fProg').value;
  const el=document.getElementById('fSub');
  const cur=el.value;
  el.innerHTML='<option value="">Všechny podprogramy</option>';
  const subs=[...new Set(DATA.filter(d=>!pr||d.program===pr).map(d=>d.podprogram).filter(Boolean))].sort();
  subs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;el.appendChild(o);});
  if(subs.includes(cur))el.value=cur;
}
updateSubs();
document.getElementById('fProg').addEventListener('change',()=>{updateSubs();render();});

function filtered(){
  const q=document.getElementById('q').value.toLowerCase();
  const st=document.getElementById('fStav').value;
  const pr=document.getElementById('fProg').value;
  const sb=document.getElementById('fSub').value;
  const so=document.getElementById('fSort').value;
  let r=DATA.filter(d=>{
    if(st&&d.stav!==st)return false;
    if(pr&&d.program!==pr)return false;
    if(sb&&d.podprogram!==sb)return false;
    if(q){const h=[d.vyzva,d.poskytovatel,d.program,d.podprogram,d.typ_akce,d.cilova_skupina].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  r.sort((a,b)=>{
    if(so==='dl'){const da=a.uzaverka&&/^\d{4}/.test(a.uzaverka)?a.uzaverka:'9999';const db=b.uzaverka&&/^\d{4}/.test(b.uzaverka)?b.uzaverka:'9999';return da.localeCompare(db);}
    if(so==='dotD')return(parseDot(b.max_dotace)||0)-(parseDot(a.max_dotace)||0);
    if(so==='dotA')return(parseDot(a.max_dotace)||0)-(parseDot(b.max_dotace)||0);
    if(so==='az')return lbl(a).localeCompare(lbl(b),'cs');
    return 0;
  });
  return r;
}

function render(){
  _rows=filtered();
  const ak=DATA.filter(d=>d.stav==='aktivní').length;
  const pl=DATA.filter(d=>d.stav==='plánované').length;
  const uz=DATA.filter(d=>d.stav==='uzavřena').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><span class="stat-num g">${ak}</span><div class="stat-label">Aktivní</div></div>
    <div class="stat"><span class="stat-num o">${pl}</span><div class="stat-label">Plánované</div></div>
    <div class="stat"><span class="stat-num m">${uz}</span><div class="stat-label">Uzavřené</div></div>
    <div class="stat"><span class="stat-num b">${DATA.length}</span><div class="stat-label">Celkem</div></div>`;
  document.getElementById('cnt').textContent=`Zobrazeno ${_rows.length} z ${DATA.length} výzev`;
  const emp=document.getElementById('emp');
  const tb=document.getElementById('tb');
  if(_rows.length===0){tb.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';
  tb.innerHTML=_rows.map((d,i)=>{
    const name=esc(lbl(d));
    const hint=(d.vyzva||d.typ_akce)&&d.program?`<div class="prog-hint">${esc(d.program.trim())}${d.podprogram?' › '+esc(d.podprogram):''}</div>`:'';
    const dc=dlCls(d.uzaverka);
    const dl=fmtDate(d.uzaverka)||'<span style="color:var(--muted)">—</span>';
    const dot=fmtDot(d.max_dotace,d.mena);
    const dotH=dot?(dot.txt?`<span class="dot-txt">${esc(dot.t)}</span>`:`<span class="dot-val">${esc(dot.t)}</span><span class="dot-mena">${esc(dot.m||'')}</span>`):'<span style="color:var(--muted)">—</span>';
    return `<tr onclick="openP(${i})">
      <td class="td-vyzva">${name}${hint}</td>
      <td class="td-prov">${esc(d.poskytovatel)}</td>
      <td class="td-sub">${esc(d.podprogram)||'—'}</td>
      <td class="td-cil">${esc(d.cilova_skupina)||'—'}</td>
      <td>${badge(d.stav)}</td>
      <td class="td-dl ${dc}">${dl}</td>
      <td class="td-dot">${dotH}</td>
      <td class="td-kom">${esc(d.komentar)||''}</td>
    </tr>`;
  }).join('');
}

function openP(i){
  const d=_rows[i];if(!d)return;
  const dot=fmtDot(d.max_dotace,d.mena);
  const dotStr=dot?(dot.txt?dot.t:`${dot.t} ${dot.m||''}`):' —';
  const crumb=[d.poskytovatel,d.program,d.podprogram,d.typ_akce].filter(Boolean).map(esc).join(' <span style="opacity:.4">›</span> ');
  const dc=dlCls(d.uzaverka);
  document.getElementById('pc').innerHTML=`
    <div class="pstav">${badge(d.stav)}</div>
    <div class="ptitle">${esc(lbl(d))}</div>
    <div class="pcrumb">${crumb}</div>
    <div class="pgrid">
      <div class="pcell"><div class="pclabel">Uzávěrka</div><div class="pcval big ${dc}">${fmtDate(d.uzaverka)||'—'}</div></div>
      <div class="pcell"><div class="pclabel">Max. dotace</div><div class="pcval big">${esc(dotStr)}</div></div>
      <div class="pcell full"><div class="pclabel">Cílová skupina</div><div class="pcval">${esc(d.cilova_skupina)||'—'}</div></div>
    </div>
    ${d.komentar?`<div class="pkom">💬 ${esc(d.komentar)}</div>`:''}
    ${d.naklady?`<div class="psec">Uznatelné náklady</div><div class="pnaklady">${esc(d.naklady)}</div>`:''}
    ${d.zdroj?`<div class="psec">Zdroj</div><div style="font-size:12px;color:var(--muted);padding:.5rem 0;word-break:break-word">${esc(d.zdroj)}</div>`:''}`;
  document.getElementById('ov').classList.add('open');
  document.getElementById('panel').classList.add('open');
}
function closeP(){document.getElementById('ov').classList.remove('open');document.getElementById('panel').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeP();});

function reset(){
  document.getElementById('q').value='';
  document.getElementById('fStav').value='';
  document.getElementById('fProg').value='';
  updateSubs();
  document.getElementById('fSub').value='';
  document.getElementById('fSort').value='dl';
  render();
}

['q','fStav','fSub','fSort'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('input',render);
  el.addEventListener('change',render);
});

render();
</script>
</body>
