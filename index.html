<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databáze grantových příležitostí</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Notion-inspired palette ─────────────────────────────── */
:root{
  --bg:       #191919;
  --surface:  #252525;
  --surface2: #2f2f2f;
  --border:   #373737;
  --border2:  #484848;
  --text:     #e6e6e4;
  --muted:    #7f7f7f;
  --muted2:   #a0a0a0;

  --green:    #4dac80;
  --green-bg: #1e3329;
  --green-br: #2d5941;

  --yellow:   #d4a017;
  --yellow-bg:#332b10;
  --yellow-br:#5a4718;

  --red:      #e06c5a;
  --red-bg:   #38201c;
  --red-br:   #5e3028;

  --blue:     #6ea8e0;
  --blue-bg:  #1a2a3d;
  --blue-br:  #2a4468;

  --purple:   #9f7fe0;
  --purple-bg:#271e3d;

  --accent:   #5b9cf6;
  --ff: 'Inter', system-ui, sans-serif;
  --radius: 4px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── HEADER ─────────────────────────────────────────────── */
.header{
  padding:2.5rem 3rem 1.5rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:2rem;flex-wrap:wrap;
}
.header h1{font-size:1.75rem;font-weight:700;letter-spacing:-.03em;color:var(--text)}
.header .sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ── STATS ──────────────────────────────────────────────── */
.stats{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.stat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:.6rem 1rem;min-width:76px;text-align:center;
}
.stat-num{font-size:1.4rem;font-weight:700;display:block;letter-spacing:-.02em}
.stat-num.g{color:var(--green)}.stat-num.y{color:var(--yellow)}
.stat-num.m{color:var(--muted2)}.stat-num.b{color:var(--blue)}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* ── FILTERS ─────────────────────────────────────────────── */
.filters{
  padding:.9rem 3rem;border-bottom:1px solid var(--border);
  display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;
  background:var(--surface);
}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:11px;font-weight:500;color:var(--muted2);letter-spacing:.03em}
.filters select,.filters input{
  font-family:var(--ff);font-size:13px;
  padding:5px 9px;border:1px solid var(--border2);
  border-radius:var(--radius);background:var(--bg);color:var(--text);
  height:31px;outline:none;cursor:pointer;
}
.filters input{min-width:200px;cursor:text}
.filters select:hover,.filters input:hover{border-color:var(--muted)}
.filters select:focus,.filters input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(35,131,226,.15)}
.sep{width:1px;background:var(--border);height:31px;margin:0 2px;align-self:flex-end}
.btn-reset{
  font-family:var(--ff);font-size:12px;font-weight:500;color:var(--muted2);
  border:1px solid var(--border2);background:var(--bg);
  padding:4px 11px;border-radius:var(--radius);cursor:pointer;height:31px;
  align-self:flex-end;transition:all .12s;
}
.btn-reset:hover{background:var(--surface2);border-color:var(--muted);color:var(--text)}

/* ── COUNT BAR ───────────────────────────────────────────── */
.countbar{
  padding:.55rem 3rem;border-bottom:1px solid var(--border);
  font-size:12px;color:var(--muted);display:flex;align-items:center;gap:1rem;
}

/* ── TABLE ───────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);padding:8px 16px;text-align:left;
  background:var(--surface);border-bottom:1px solid var(--border);
  white-space:nowrap;position:sticky;top:0;z-index:2;
}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
tbody tr:hover{background:var(--surface)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 16px;vertical-align:top;line-height:1.5}

.td-vyzva{font-weight:500;max-width:280px;font-size:13px}
.prog-hint{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px}
.td-prov{color:var(--muted2);white-space:nowrap;font-size:12px}
.td-sub{color:var(--muted2);max-width:140px;font-size:12px}
.td-cil{max-width:180px;color:var(--muted2);font-size:12px}
.td-dl{white-space:nowrap;font-size:13px}
.td-dot{white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
.td-kom{max-width:160px;color:var(--muted);font-size:11px;font-style:italic}
.td-zdroj{white-space:nowrap}

/* ── BADGES ──────────────────────────────────────────────── */
.badge{
  display:inline-block;font-size:11px;font-weight:500;
  padding:2px 8px;border-radius:var(--radius);white-space:nowrap;
}
.ba{background:var(--green-bg);color:var(--green);border:1px solid var(--green-br)}
.bp{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-br)}
.bu{background:var(--red-bg);color:var(--red);border:1px solid var(--red-br)}

/* ── DEADLINE colors ────────────────────────────────────── */
.urgent{color:var(--red);font-weight:600}
.soon{color:var(--yellow)}
.past{color:var(--muted);text-decoration:line-through}

/* ── DOTACE ──────────────────────────────────────────────── */
.dot-val{font-weight:600}
.dot-mena{font-size:11px;color:var(--muted);margin-left:3px}
.dot-txt{color:var(--muted);font-size:12px;font-style:italic}

/* ── ZDROJ link ──────────────────────────────────────────── */
.zdroj-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--accent);text-decoration:none;
  padding:2px 6px;border-radius:var(--radius);
  border:1px solid var(--blue-br);background:var(--blue-bg);
  transition:all .12s;white-space:nowrap;
}
.zdroj-link:hover{background:var(--blue-bg);border-color:var(--accent);text-decoration:underline}

/* ── EMPTY ───────────────────────────────────────────────── */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:14px}

/* ── DETAIL PANEL ────────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100}
.overlay.open{display:block}
.panel{
  position:fixed;top:0;right:0;bottom:0;width:min(580px,96vw);
  background:var(--bg);border-left:1px solid var(--border);
  z-index:101;overflow-y:auto;
  transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);
  padding:2rem 2rem 3rem;
}
.panel.open{transform:translateX(0)}
.pclose{
  position:absolute;top:1rem;right:1rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);width:28px;height:28px;
  cursor:pointer;color:var(--muted2);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .1s;
}
.pclose:hover{background:var(--surface2);color:var(--text)}
.pstav{margin-bottom:.75rem}
.ptitle{font-size:1.25rem;font-weight:700;line-height:1.3;margin-bottom:.4rem;padding-right:2.5rem;letter-spacing:-.02em}
.pcrumb{font-size:12px;color:var(--muted);margin-bottom:1.5rem;display:flex;gap:5px;flex-wrap:wrap;align-items:center}

.pgrid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--border);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;margin-bottom:1.25rem;
}
.pcell{background:var(--surface);padding:.85rem 1rem}
.pcell.full{grid-column:1/-1}
.pclbl{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.pcval{font-size:13px;color:var(--text);line-height:1.5}
.pcval.big{font-size:1.15rem;font-weight:700;letter-spacing:-.01em}

.psec{
  font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);margin:1.25rem 0 .5rem;
  padding-bottom:.4rem;border-bottom:1px solid var(--border);
}
.pnaklady{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:1rem;font-size:12px;line-height:1.75;white-space:pre-wrap;color:var(--text);
}
.pkom{
  background:var(--yellow-bg);border:1px solid var(--yellow-br);
  border-radius:8px;padding:.75rem 1rem;
  font-size:13px;color:var(--yellow);margin-bottom:1rem;
}
.pzdroj-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;color:var(--accent);
  text-decoration:none;padding:8px 14px;border-radius:6px;
  border:1px solid var(--blue-br);background:var(--blue-bg);
  transition:all .12s;margin-top:.5rem;
}
.pzdroj-link:hover{background:#ddeeff;text-decoration:underline}

/* ── HARMONOGRAM MODAL ───────────────────────────────────── */
.hmodal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center}
.hmodal-overlay.open{display:flex}
.hmodal{
  background:var(--bg);border:1px solid var(--border);
  border-radius:12px;max-width:700px;width:95vw;max-height:85vh;
  overflow-y:auto;padding:2rem;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.hmodal-close{
  position:absolute;top:1rem;right:1rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);width:28px;height:28px;
  cursor:pointer;color:var(--muted2);font-size:15px;
  display:flex;align-items:center;justify-content:center;
}
.hmodal-close:hover{background:var(--surface2)}
.hmodal h2{font-size:1.1rem;font-weight:700;margin-bottom:.3rem;padding-right:2rem}
.hmodal .hsub{font-size:12px;color:var(--muted);margin-bottom:1.5rem}
.htable{width:100%;border-collapse:collapse;font-size:13px}
.htable th{
  text-align:left;padding:7px 12px;font-size:11px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
  background:var(--surface);border-bottom:1px solid var(--border);
}
.htable td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
.htable tr:last-child td{border-bottom:none}
.htable tr:hover td{background:var(--surface)}
.hbtn{
  font-family:var(--ff);font-size:12px;font-weight:500;
  color:var(--purple);background:var(--purple-bg);
  border:1px solid #c9b8e8;border-radius:var(--radius);
  padding:4px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;
  transition:all .12s;
}
.hbtn:hover{background:#e8dffa}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Databáze dotačních příležitostí</h1>
    <div class="sub">Inkubace a akcelerace výzkumných projektů · list Výzvy</div>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="filters">
  <div class="fg"><div class="fl">Hledat</div>
    <input type="text" id="q" placeholder="Název výzvy, cílová skupina…">
  </div>
  <div class="sep"></div>
  <div class="fg"><div class="fl">Poskytovatel</div>
    <select id="fProv"><option value="">Všichni poskytovatelé</option></select>
  </div>
  <div class="fg"><div class="fl">Stav</div>
    <select id="fStav">
      <option value="">Všechny stavy</option>
      <option value="aktivní">Aktivní</option>
      <option value="plánované">Plánované</option>
      <option value="uzavřena">Uzavřené</option>
    </select>
  </div>
  <div class="fg"><div class="fl">Program</div>
    <select id="fProg"><option value="">Všechny programy</option></select>
  </div>
  <div class="fg"><div class="fl">Podprogram</div>
    <select id="fSub"><option value="">Všechny podprogramy</option></select>
  </div>
  <div class="sep"></div>
  <div class="fg"><div class="fl">Řadit</div>
    <select id="fSort">
      <option value="dl">Deadline ↑</option>
      <option value="dotD">Dotace ↓</option>
      <option value="dotA">Dotace ↑</option>
      <option value="az">Název A→Z</option>
    </select>
  </div>
  <button class="btn-reset" onclick="reset()">✕ Reset</button>
</div>

<div class="countbar" id="cnt"></div>

<div class="tbl-wrap">
<table>
  <thead><tr>
    <th>Výzva / Program</th>
    <th>Poskytovatel</th>
    <th>Podprogram</th>
    <th>Cílová skupina</th>
    <th>Stav</th>
    <th>Uzávěrka</th>
    <th style="text-align:right">Max dotace</th>
    <th>Zdroj</th>
    <th>Komentář</th>
  </tr></thead>
  <tbody id="tb"></tbody>
</table>
<div class="empty" id="emp" style="display:none">Žádné výzvy neodpovídají filtrům.</div>
</div>

<!-- DETAIL PANEL -->
<div class="overlay" id="ov" onclick="closeP()"></div>
<div class="panel" id="panel">
  <button class="pclose" onclick="closeP()">✕</button>
  <div id="pc"></div>
</div>

<!-- HARMONOGRAM MODAL -->
<div class="hmodal-overlay" id="hov" onclick="if(event.target===this)closeH()">
  <div class="hmodal">
    <button class="hmodal-close" onclick="closeH()">✕</button>
    <div id="hcontent"></div>
  </div>
</div>

let _rows = [];

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lbl(d){return d.vyzva||d.typ_akce||d.podprogram||d.program||'—';}
function parseDot(v){if(!v)return null;const n=parseFloat(String(v).replace(/\s/g,'').replace(',','.'));return isNaN(n)?null:n;}
function fmtDot(v,m){
  if(!v)return null;
  const n=parseDot(v);
  if(!n)return{t:v,txt:true};
  let s=n>=1e6?(n/1e6).toLocaleString('cs-CZ',{maximumFractionDigits:1})+' mil.':n>=1000?(n/1000).toLocaleString('cs-CZ',{maximumFractionDigits:0})+' tis.':n.toLocaleString('cs-CZ');
  return{t:s,m,txt:false};
}
function fmtDate(s){if(!s)return null;if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const[y,mo,d]=s.split('-');return `${d}.${mo}.${y}`;}return s;}
function dlCls(s){
  if(!s||!/^\d{4}-\d{2}-\d{2}$/.test(s))return '';
  const diff=(new Date(s)-new Date())/86400000;
  if(diff<0)return 'past';if(diff<14)return 'urgent';if(diff<45)return 'soon';return '';
}
function badge(stav){
  if(!stav)return '';
  const c=stav==='aktivní'?'ba':stav==='plánované'?'bp':'bu';
  const l=stav==='aktivní'?'Aktivní':stav==='plánované'?'Plánované':'Uzavřená';
  return `<span class="badge ${c}">${l}</span>`;
}
function zdrojLink(z){
  if(!z)return '';
  const q=encodeURIComponent(z.replace(/\u2060/g,'').trim());
  return `<a class="zdroj-link" href="https://www.google.com/search?q=${q}" target="_blank" title="${esc(z)}">↗ Zdroj</a>`;
}

  const prov=document.getElementById('fProv').value;
  const el=document.getElementById('fSub');
  const cur=el.value;
  el.innerHTML='<option value="">Všechny podprogramy</option>';
  const subs=[...new Set(DATA.filter(d=>(!pr||d.program===pr)&&(!prov||d.poskytovatel===prov)).map(d=>d.podprogram).filter(Boolean))].sort();
  subs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;el.appendChild(o);});
  if(subs.includes(cur))el.value=cur;
}

function updateProgs(){
  const prov=document.getElementById('fProv').value;
  const el=document.getElementById('fProg');
  const cur=el.value;
  el.innerHTML='<option value="">Všechny programy</option>';

function filtered(){
  const q=document.getElementById('q').value.toLowerCase();
  const prov=document.getElementById('fProv').value;
  const st=document.getElementById('fStav').value;
  const pr=document.getElementById('fProg').value;
  const sb=document.getElementById('fSub').value;

  });
  r.sort((a,b)=>{
    if(so==='dl'){const da=a.uzaverka&&/^\d{4}/.test(a.uzaverka)?a.uzaverka:'9999';const db=b.uzaverka&&/^\d{4}/.test(b.uzaverka)?b.uzaverka:'9999';return da.localeCompare(db);}
    if(so==='dotD')return(parseDot(b.max_dotace)||0)-(parseDot(a.max_dotace)||0);
    if(so==='dotA')return(parseDot(a.max_dotace)||0)-(parseDot(b.max_dotace)||0);
    if(so==='az')return lbl(a).localeCompare(lbl(b),'cs');
    return 0;
  });
  return r;
}

function render(){
  _rows=filtered();
  const ak=DATA.filter(d=>d.stav==='aktivní').length;
  const pl=DATA.filter(d=>d.stav==='plánované').length;
  const uz=DATA.filter(d=>d.stav==='uzavřena').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><span class="stat-num g">${ak}</span><div class="stat-lbl">Aktivní</div></div>
    <div class="stat"><span class="stat-num y">${pl}</span><div class="stat-lbl">Plánované</div></div>
    <div class="stat"><span class="stat-num m">${uz}</span><div class="stat-lbl">Uzavřené</div></div>
    <div class="stat"><span class="stat-num b">${DATA.length}</span><div class="stat-lbl">Celkem</div></div>`;
  document.getElementById('cnt').textContent=`Zobrazeno ${_rows.length} z ${DATA.length} výzev`;
  const emp=document.getElementById('emp');
  const tb=document.getElementById('tb');
  if(_rows.length===0){tb.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';
  tb.innerHTML=_rows.map((d,i)=>{
    const name=esc(lbl(d));
    const hint=(d.vyzva||d.typ_akce)&&d.program?`<div class="prog-hint">${esc(d.program.trim())}${d.podprogram?' › '+esc(d.podprogram):''}</div>`:'';
    const dc=dlCls(d.uzaverka);
    const dl=fmtDate(d.uzaverka)||'<span style="color:var(--muted)">—</span>';
    const dot=fmtDot(d.max_dotace,d.mena);
    const dotH=dot?(dot.txt?`<span class="dot-txt">${esc(dot.t)}</span>`:`<span class="dot-val">${esc(dot.t)}</span><span class="dot-mena">${esc(dot.m||'')}</span>`):'<span style="color:var(--muted)">—</span>';
    return `<tr onclick="openP(${i})">
      <td class="td-vyzva">${name}${hint}</td>
      <td class="td-prov">${esc(d.poskytovatel)}</td>
      <td class="td-sub">${esc(d.podprogram)||'—'}</td>
      <td class="td-cil">${esc(d.cilova_skupina)||'—'}</td>
      <td>${badge(d.stav)}</td>
      <td class="td-dl ${dc}">${dl}</td>
      <td class="td-dot">${dotH}</td>
      <td class="td-zdroj" onclick="event.stopPropagation()">${zdrojLink(d.zdroj)}</td>
      <td class="td-kom">${esc(d.komentar)||''}</td>
    </tr>`;
  }).join('');
}

function openP(i){
  const d=_rows[i];if(!d)return;
  const dot=fmtDot(d.max_dotace,d.mena);
  const dotStr=dot?(dot.txt?dot.t:`${dot.t} ${dot.m||''}`):' —';
  const crumb=[d.poskytovatel,d.program,d.podprogram,d.typ_akce].filter(Boolean).map(esc).join(' <span style="opacity:.4">›</span> ');
  const dc=dlCls(d.uzaverka);
  const hbtn=HARMONOGRAM[d.poskytovatel]?`<button class="hbtn" onclick="openH('${esc(d.poskytovatel)}')">📅 Harmonogram ${esc(d.poskytovatel)}</button>`:'';
  const zlink=d.zdroj?`<a class="pzdroj-link" href="https://www.google.com/search?q=${encodeURIComponent(d.zdroj.replace(/\u2060/g,'').trim())}" target="_blank">↗ Otevřít zdroj</a>`:'';
  document.getElementById('pc').innerHTML=`
    <div class="pstav">${badge(d.stav)}</div>
    <div class="ptitle">${esc(lbl(d))}</div>
    <div class="pcrumb">${crumb}</div>
    <div class="pgrid">
      <div class="pcell"><div class="pclbl">Uzávěrka</div><div class="pcval big ${dc}">${fmtDate(d.uzaverka)||'—'}</div></div>
      <div class="pcell"><div class="pclbl">Max. dotace</div><div class="pcval big">${esc(dotStr)}</div></div>
      <div class="pcell full"><div class="pclbl">Cílová skupina</div><div class="pcval">${esc(d.cilova_skupina)||'—'}</div></div>
    </div>
    ${d.komentar?`<div class="pkom">💬 ${esc(d.komentar)}</div>`:''}
    ${d.naklady?`<div class="psec">Uznatelné náklady</div><div class="pnaklady">${esc(d.naklady)}</div>`:''}
    ${d.zdroj?`<div class="psec">Zdroj</div>${zlink}`:''}
    ${hbtn?`<div class="psec" style="margin-top:1.5rem">Harmonogram poskytovatele</div>${hbtn}`:''}`;
  document.getElementById('ov').classList.add('open');
  document.getElementById('panel').classList.add('open');
}
function closeP(){document.getElementById('ov').classList.remove('open');document.getElementById('panel').classList.remove('open');}

function openH(prov){
  const h=HARMONOGRAM[prov];if(!h)return;
  const rows=h.polozky.map(p=>`<tr>
    <td>${esc(p.program)}</td>
    <td>${esc(p.vyzva)}</td>
    <td>${esc(p.termin)}</td>
    <td>${badge(p.stav)}</td>
  </tr>`).join('');
  document.getElementById('hcontent').innerHTML=`
    <h2>Harmonogram: ${esc(prov)}</h2>
    <div class="hsub">Přehled plánovaných a probíhajících výzev · <a href="${esc(h.url)}" target="_blank" style="color:var(--accent)">Oficiální web ↗</a></div>
    <table class="htable">
      <thead><tr><th>Program</th><th>Výzva</th><th>Termín</th><th>Stav</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  document.getElementById('hov').classList.add('open');
}
function closeH(){document.getElementById('hov').classList.remove('open');}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeH();closeP();}});

function reset(){
  document.getElementById('q').value='';
  document.getElementById('fProv').value='';
  document.getElementById('fStav').value='';
  updateProgs();
  document.getElementById('fProg').value='';
  updateSubs();
  document.getElementById('fSub').value='';
  document.getElementById('fSort').value='dl';
  render();
}

['q','fStav','fSub','fSort'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('input',render);
  el.addEventListener('change',render);
});

render();
</script>
</body>
</html>
